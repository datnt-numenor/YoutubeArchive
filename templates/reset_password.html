{% extends "base.html" %}

{% block content %}
<section class="auth-shell">
    <div class="panel auth-panel">
        <div class="panel-header">
            <h1>Choose password</h1>
            <p>Set a new password for your archive account.</p>
        </div>
        {% if error %}
        <div class="alert alert-danger" role="alert">{{ error }}</div>
        {% endif %}
        <form method="post" action="/reset-password" class="d-grid gap-3">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <input type="hidden" name="token" value="{{ token }}">
            <div>
                <label class="form-label" for="password">New password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-key"></i></span>
                    <input class="form-control" id="password" name="password" type="password" autocomplete="new-password" minlength="8" required autofocus>
                </div>
            </div>
            <button class="btn btn-danger" type="submit">
                <i class="bi bi-save me-1"></i>Reset password
            </button>
        </form>
    </div>
</section>
{% endblock %}
