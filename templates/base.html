<!doctype html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ app_name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="{{ url_for('static', path='/css/app.css') }}" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg border-bottom bg-white sticky-top">
        <div class="container-fluid app-shell">
            <a class="navbar-brand fw-semibold" href="/">
                <i class="bi bi-collection-play me-2 text-danger"></i>{{ app_name }}
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#topNav" aria-controls="topNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="topNav">
                <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
                    {% if user %}
                    <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-list-ul me-1"></i>Playlists</a></li>
                    <li class="nav-item"><a class="nav-link" href="/settings"><i class="bi bi-sliders me-1"></i>Settings</a></li>
                    <li class="nav-item text-muted small px-lg-2">{{ user.email }}</li>
                    <li class="nav-item">
                        <form method="post" action="/logout">
                            <button class="nav-link btn btn-link px-lg-2" type="submit">
                                <i class="bi bi-box-arrow-right me-1"></i>Logout
                            </button>
                        </form>
                    </li>
                    {% else %}
                    <li class="nav-item"><a class="nav-link" href="/login"><i class="bi bi-box-arrow-in-right me-1"></i>Login</a></li>
                    <li class="nav-item"><a class="nav-link" href="/register"><i class="bi bi-person-plus me-1"></i>Register</a></li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <main class="container-fluid app-shell py-4">
        {% if user %}
        <section class="active-downloads d-none" id="activeDownloads">
            <div class="active-downloads-header">
                <div>
                    <h2>Downloading</h2>
                    <p class="text-muted mb-0">Current sync progress and failed videos</p>
                </div>
                <button class="btn btn-sm btn-outline-secondary" type="button" id="activeDownloadsRefresh" title="Refresh downloads">
                    <i class="bi bi-arrow-clockwise"></i>
                </button>
            </div>
            <div class="active-downloads-list" id="activeDownloadsList"></div>
        </section>
        {% endif %}
        {% block content %}{% endblock %}
    </main>

    <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastArea"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', path='/js/app.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
