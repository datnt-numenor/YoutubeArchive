{% extends "base.html" %}

{% block content %}
<section class="auth-shell">
    <div class="panel auth-panel">
        <div class="panel-header">
            <h1>Reset password</h1>
            <p>Enter your account email to receive a reset link.</p>
        </div>
        {% if error %}
        <div class="alert alert-danger" role="alert">{{ error }}</div>
        {% endif %}
        {% if message %}
        <div class="alert alert-success" role="alert">{{ message }}</div>
        {% endif %}
        <form method="post" action="/forgot-password" class="d-grid gap-3">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <div>
                <label class="form-label" for="email">Email</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input class="form-control" id="email" name="email" type="email" autocomplete="email" required autofocus>
                </div>
            </div>
            <button class="btn btn-danger" type="submit">
                <i class="bi bi-send me-1"></i>Send reset link
            </button>
        </form>
        <div class="auth-switch">
            Remembered it? <a href="/login">Login</a>
        </div>
    </div>
</section>
{% endblock %}
